<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extendio — Haar-Accessoires aus Alicante</title>
<meta name="description" content="Extendio: Entwirrbürsten mit 29 % biobasiertem Anteil (ASTM D6866), Bambus-Wattestäbchen, Haarklammern und Salon-Zubehör. Erhältlich auf Amazon.de, Amazon.es und Amazon.co.uk.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link href="assets/fonts.css" rel="stylesheet">
<style>
  :root{
    --ink:#0e000e;            /* exakte Logo-Hintergrundfarbe */
    --ink-soft:#1c0f20;
    --paper:#f7f2ec;          /* off-white Produktflächen */
    --card:#ffffff;
    --magenta:#c73bdd;
    --magenta-deep:#8a2be2;
    --copper:#c98a5e;
    --copper-light:#e0b394;
    --text-dark:#241826;
    --text-mute:#6d5f70;
    --text-on-dark:#f3e9f4;
    --grad:linear-gradient(100deg,#c73bdd 0%,#8a2be2 100%);
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Jost',sans-serif;background:var(--paper);color:var(--text-dark);line-height:1.6}
  h1,h2,h3,.serif{font-family:'Playfair Display',serif}
  img{max-width:100%;display:block}
  a{color:inherit}

  /* ---------- Header ---------- */
  header{position:sticky;top:0;z-index:50;background:var(--ink);border-bottom:1px solid rgba(201,138,94,.25)}
  .header-inner{max-width:1180px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:28px}
  .logo img{height:56px;width:auto;mix-blend-mode:screen} /* blendet den dunklen Logo-Hintergrund in den Header ein */
  nav{display:flex;gap:26px;margin-left:auto}
  nav a{color:var(--text-on-dark);text-decoration:none;font-size:.95rem;font-weight:400;letter-spacing:.04em;opacity:.85;transition:.2s}
  nav a:hover{opacity:1;color:var(--copper-light)}
  .lang-switch{display:flex;gap:4px;background:rgba(255,255,255,.07);border-radius:99px;padding:4px}
  .lang-switch button{border:0;background:transparent;color:var(--text-on-dark);font-family:inherit;font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:99px;cursor:pointer;letter-spacing:.05em;opacity:.7;transition:.2s}
  .lang-switch button.active{background:var(--grad);opacity:1}
  .lang-switch button:hover{opacity:1}

  /* ---------- Hero ---------- */
  .hero{background:radial-gradient(1100px 600px at 75% -10%,#2a1030 0%,var(--ink) 60%);color:var(--text-on-dark)}
  .hero-inner{max-width:1180px;margin:0 auto;padding:72px 24px 88px;display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center}
  .hero h1{font-size:clamp(2.1rem,4.2vw,3.4rem);font-weight:600;line-height:1.15;margin-bottom:20px}
  .hero h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-weight:300;font-size:1.08rem;max-width:52ch;opacity:.88;margin-bottom:32px}
  .hero-img{background:var(--paper);border-radius:calc(var(--radius) + 8px);padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(201,138,94,.35)}
  .hero-img img{border-radius:10px}
  .btn{display:inline-flex;align-items:center;gap:10px;background:var(--grad);color:#fff;text-decoration:none;font-family:'Jost',sans-serif;font-weight:500;font-size:1rem;letter-spacing:.04em;padding:14px 30px;border-radius:99px;transition:.25s;box-shadow:0 8px 26px rgba(199,59,221,.35)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(199,59,221,.5)}
  .btn svg{flex:none}
  .btn-ghost{display:inline-flex;align-items:center;margin-left:14px;color:var(--copper-light);text-decoration:none;font-size:.98rem;padding:14px 10px;border-bottom:1px solid transparent;transition:.2s}
  .btn-ghost:hover{border-color:var(--copper-light)}
  .hero-note{font-size:.82rem;opacity:.55;margin-top:18px;font-weight:300}
  .trust-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
  .trust-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,138,94,.45);color:var(--copper-light);border-radius:99px;padding:7px 16px;font-size:.8rem;letter-spacing:.03em;font-weight:400}
  .badge-design{display:inline-flex;align-items:center;gap:6px;color:var(--copper);font-size:.8rem;font-weight:500;letter-spacing:.02em;margin-top:10px}

  /* ---------- Sections ---------- */
  section{padding:80px 24px}
  .wrap{max-width:1180px;margin:0 auto}
  .kicker{font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);font-weight:600;margin-bottom:10px}
  h2{font-size:clamp(1.7rem,3vw,2.4rem);font-weight:600;margin-bottom:14px}
  .section-lead{max-width:62ch;color:var(--text-mute);margin-bottom:48px}

  /* ---------- Philosophy ---------- */
  .phil{background:var(--card)}
  .phil-inner{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
  .phil-img{border-radius:var(--radius);overflow:hidden;box-shadow:0 20px 50px rgba(36,24,38,.12)}
  .phil-img img{width:100%;height:100%;object-fit:cover}
  .phil p{color:var(--text-mute);margin-bottom:16px;max-width:56ch}
  @media(max-width:900px){.phil-inner{grid-template-columns:1fr;gap:32px}}

  /* ---------- Product grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:26px}
  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(36,24,38,.07);transition:.25s}
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(36,24,38,.13)}
  .card-img{aspect-ratio:1/1;background:#fff;display:flex;align-items:center;justify-content:center;padding:20px;border-bottom:1px solid #f0e8e0}
  .card-img img{max-height:100%;object-fit:contain}
  .card-body{padding:22px 22px 26px;display:flex;flex-direction:column;flex:1}
  .card h3{font-size:1.28rem;font-weight:600;margin-bottom:8px}
  .card p{font-size:.93rem;color:var(--text-mute);flex:1}
  .price-row{display:flex;align-items:baseline;gap:10px;margin:16px 0 14px;min-height:1.4em}
  .price{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--copper)}
  .price-old{font-size:.9rem;color:var(--text-mute);text-decoration:line-through}
  .price-note{font-size:.85rem;color:var(--text-mute)}
  .swatches{display:flex;gap:8px;margin:14px 0 2px}
  .swatch{width:26px;height:26px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #d8ccc0;transition:.2s;display:block}
  .swatch:hover{transform:scale(1.15);box-shadow:0 0 0 2px var(--magenta)}
  .card .btn{justify-content:center;font-size:.92rem;padding:12px 20px;margin-top:6px}
  .grid-note{font-size:.8rem;color:var(--text-mute);margin-top:26px}

  /* ---------- Facts ---------- */
  .facts{background:var(--card)}
  .facts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:26px}
  .fact{background:var(--paper);border-radius:var(--radius);padding:30px 28px;border-top:3px solid var(--copper)}
  .fact .num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--copper);margin-bottom:8px}
  .fact h3{font-size:1.1rem;margin-bottom:8px}
  .fact p{font-size:.92rem;color:var(--text-mute)}

  /* ---------- B2B ---------- */
  .b2b{background:radial-gradient(900px 500px at 20% 0%,#2a1030 0%,var(--ink) 65%);color:var(--text-on-dark)}
  .b2b-inner{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:center}
  .b2b-img{background:var(--paper);border-radius:calc(var(--radius) + 6px);padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.4),0 0 0 1px rgba(201,138,94,.35)}
  .b2b-img img{border-radius:10px}
  .b2b .kicker{color:var(--copper-light)}
  .b2b p{opacity:.88;font-weight:300;margin-bottom:26px;max-width:56ch}
  .b2b .price-row{margin:0 0 22px}
  .b2b .price{color:var(--copper-light)}
  .b2b .price-old{color:rgba(243,233,244,.55)}

  /* ---------- Wholesale / B2B-Modul ---------- */
  .wholesale{margin-top:64px;border:1px solid rgba(201,138,94,.4);border-radius:var(--radius);padding:36px 34px;display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:center;background:rgba(255,255,255,.04)}
  .wholesale h3{font-size:1.5rem;margin-bottom:10px}
  .wholesale p{font-size:.98rem;opacity:.85;font-weight:300;margin:0}
  .wholesale-ctas{display:flex;flex-direction:column;gap:12px}
  .wholesale-ctas .btn{justify-content:center}
  .btn-wa{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:#25d366;color:#0b3d1f;text-decoration:none;font-weight:600;font-size:1rem;letter-spacing:.03em;padding:14px 30px;border-radius:99px;transition:.25s;box-shadow:0 8px 26px rgba(37,211,102,.25)}
  .btn-wa:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(37,211,102,.4)}
  .wholesale-note{font-size:.85rem;opacity:.6;text-align:center;margin-top:2px}
  @media(max-width:900px){.wholesale{grid-template-columns:1fr;padding:28px 24px}}

  /* ---------- About ---------- */
  .about p{max-width:70ch;color:var(--text-mute);margin-bottom:14px}

  /* ---------- Footer ---------- */
  footer{background:var(--ink);color:var(--text-on-dark);padding:60px 24px 40px}
  .footer-grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:40px}
  footer .logo img{height:64px;margin-bottom:16px;mix-blend-mode:screen}
  footer h4{font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--copper-light);margin-bottom:14px;font-weight:600}
  footer p, footer a{font-size:.92rem;font-weight:300;opacity:.85;text-decoration:none;line-height:1.8}
  footer a:hover{color:var(--copper-light);opacity:1}
  .footer-bottom{max-width:1180px;margin:44px auto 0;padding-top:22px;border-top:1px solid rgba(243,233,244,.12);display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;font-size:.8rem;opacity:.6;font-weight:300}

  /* ---------- Responsive ---------- */
  @media(max-width:900px){
    .hero-inner,.b2b-inner{grid-template-columns:1fr;gap:40px;padding-top:48px}
    nav{display:none}
    .b2b-inner .b2b-img{order:-1}
  }
</style>
</head>

  document.querySelector('meta[name="description"]').setAttribute('content', META_DESC[lang]);

  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t[el.dataset.i18n] ?? ''; });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t[el.dataset.i18nHtml] ?? ''; });
  document.querySelectorAll('[data-i18n-alt]').forEach(el => { el.alt = t[el.dataset.i18nAlt] ?? ''; });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t[el.dataset.i18nTitle] ?? ''; el.setAttribute('aria-label', el.title); });

  /* Kauf-Buttons auf den passenden Marktplatz umschreiben */
  document.querySelectorAll('[data-buy]').forEach(el => {
    const asin = ASIN[el.dataset.buy];
    if(asin) el.href = MARKETPLACE[lang] + asin;
  });

  /* B2B-Kontakt: WhatsApp Business & E-Mail mit vorbefülltem Text in Seitensprache */
  document.querySelectorAll('[data-wa]').forEach(el => {
    el.href = 'https://wa.me/34634223898?text=' + encodeURIComponent(t.wa_text);
  });
  document.querySelectorAll('[data-mailto]').forEach(el => {
    el.href = 'mailto:extendio.es@gmail.com?subject=' + encodeURIComponent(t.mail_subject) + '&body=' + encodeURIComponent(t.wa_text);
  });

  /* Preise rendern (EN: kein €-Preis, Hinweistext stattdessen) */
  document.querySelectorAll('[data-price]').forEach(el => {
    const p = PRICES[lang][el.dataset.price];
    if(p){
      el.innerHTML = '<span class="price">' + p[0] + '</span>' + (p[1] ? '<span class="price-old">' + p[1] + '</span>' : '');
    } else {
      el.innerHTML = '<span class="price-note">' + (lang === 'en' ? 'See price on Amazon.co.uk' : '') + '</span>';
    }
  });

  document.querySelectorAll('.lang-switch button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  try{ localStorage.setItem('extendio-lang', lang); }catch(e){}
  if(window.updateConsentLang) window.updateConsentLang(lang); /* Cookie-Banner folgt der Seitensprache */
}

document.querySelectorAll('.lang-switch button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

/* Farb-Swatches: beim Überfahren/Fokussieren wechselt das Kartenfoto zur jeweiligen Farbe */
const miniImg = document.getElementById('mini-img');
document.querySelectorAll('.swatch[data-img]').forEach(s => {
  ['mouseenter','focus','touchstart'].forEach(ev =>
    s.addEventListener(ev, () => { miniImg.src = s.dataset.img; }, {passive:true}));
});

/* Erstbesuch: Browser-Sprache vorauswählen, sonst gespeicherte Wahl */
let initial = null;
try{ initial = localStorage.getItem('extendio-lang'); }catch(e){}
if(!initial){
  const nav = (navigator.language || 'en').slice(0,2).toLowerCase();
  initial = ['de','es'].includes(nav) ? nav : 'en';
}
setLang(initial);
</script>
<script src="assets/consent.js"></script>
</body>
</html>
